<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="P53E7cmy3tP3qVz4hrelxqZu92S9f_aGC-b2YfT4DcY" />
    <title>OKUTTUR | Modern Light Novel Okuma Platformu</title>
    <meta name="description" content="OKUTTUR - En sevdiğiniz Light Novel eserlerini modern, karanlık ve akıcı bir arayüzle okuyun. Kaldığınız yerden devam edin, geçmişinizi takip edin." />
    <meta name="theme-color" content="#1c1b1f" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://raw.githubusercontent.com/agnogad/openlibtr/main/library.json" as="fetch" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Lexend:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <script>
      // Smart LCP Discovery & Theme Pre-calculation
      (function() {
        // 1. Theme Pre-calculation
        const storageKey = 'okuttur-appearance';
        let appearance = null;
        try { appearance = JSON.parse(localStorage.getItem(storageKey)); } catch(e) {}
        if (appearance) {
          const root = document.documentElement;
          root.style.setProperty('--primary-color', appearance.primaryColor);
          const configs = {
            material: { bg: '#1c1b1f', surface: '#25232a', border: '#49454f' },
            pitch: { bg: '#000000', surface: '#0a0a0a', border: '#333333' },
            deep: { bg: '#050a14', surface: '#0a1221', border: '#1e293b' },
            forest: { bg: '#08100c', surface: '#0d1a14', border: '#2a3a30' }
          };
          const config = configs[appearance.theme] || configs.material;
          root.style.setProperty('--bg-color', config.bg);
          root.style.setProperty('--surface-color', config.surface);
          root.style.setProperty('--border-color', config.border);
        }

        // 2. Smart LCP Preload
        try {
          const resume = JSON.parse(localStorage.getItem('okuttur-resume'));
          if (resume && resume.slug) {
            const link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            const baseUrl = 'https://raw.githubusercontent.com/agnogad/openlibtr/main';
            const imgUrl = `${baseUrl}/books/${resume.slug}/cover.jpg`;
            link.href = `https://wsrv.nl/?url=${encodeURIComponent(imgUrl)}&w=400&output=webp&q=80`;
            link.fetchPriority = 'high';
            document.head.appendChild(link);
          }
        } catch(e) {}
      })();
    </script>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OKUTTUR | Modern Light Novel Okuma Platformu" />
    <meta property="og:description" content="Karanlık tema, modern arayüz ve akıcı okuma deneyimi ile en sevdiğiniz Light Novel eserleri OKUTTUR'da." />
    <meta property="og:image" content="https://ais-dev-dkiopw7ejp7rj3awpsgby5-17503004059.europe-west3.run.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="OKUTTUR | Modern Light Novel Okuma Platformu" />
    <meta property="twitter:description" content="Karanlık tema, modern arayüz ve akıcı okuma deneyimi ile en sevdiğiniz Light Novel eserleri OKUTTUR'da." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
